<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Authentication Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Continuous background fading loop animation */
    @keyframes cryptoFade {
      0% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.15; transform: scale(1.05); }
      100% { opacity: 0.35; transform: scale(1); }
    }

    .crypto-bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* High-quality cinematic cryptocurrency asset cluster configuration */
      background-image: url('https://images.unsplash.com/photo-1621761191319-c6fb62004040?q=80&w=1920&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      z-index: -1;
      animation: cryptoFade 12s infinite ease-in-out;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #060913; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">

  <div class="crypto-bg-layer"></div>

  <div style="width: 100%; max-width: 420px; margin: 20px 16px; background-color: rgba(15, 23, 42, 0.93); border: 1px solid rgba(51, 65, 85, 0.7); border-radius: 16px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); box-sizing: border-box; backdrop-filter: blur(8px);">
    
    <div style="text-align: center; margin-bottom: 24px;">
      <h2 style="margin: 0; font-size: 1.6rem; color: #f1f5f9; font-weight: 700; letter-spacing: -0.3px;">Welcome Back</h2>
      <p style="margin: 6px 0 0 0; font-size: 0.85rem; color: #94a3b8;">Log into your secure user dashboard panel</p>
    </div>

    <div id="custom-alert-banner" style="display: none; padding: 12px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; margin-bottom: 20px; line-height: 1.4;"></div>

    <form id="public-login-form" onsubmit="executePublicLogin(event)">
      
      <div style="margin-bottom: 18px;">
        <label style="display: block; font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px;">Username</label>
        <div style="position: relative;">
          <i class="fa-solid fa-user" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 0.85rem;"></i>
          <input type="text" id="login-username" required style="width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 11px 12px 11px 36px; color: #f8fafc; font-size: 0.88rem; box-sizing: border-box; outline: none;" placeholder="Enter your username">
        </div>
      </div>

      <div style="margin-bottom: 24px;">
        <label style="display: block; font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px;">Password</label>
        <div style="position: relative;">
          <i class="fa-solid fa-lock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 0.85rem;"></i>
          <input type="password" id="login-password" required style="width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 11px 40px 11px 36px; color: #f8fafc; font-size: 0.88rem; box-sizing: border-box; outline: none;" placeholder="••••••••">
          <i class="fa-solid fa-eye-slash" id="toggle-login-pass" onclick="toggleLoginPassword()" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 0.9rem; cursor: pointer;"></i>
        </div>
      </div>

      <button type="submit" style="width: 100%; background-color: #38bdf8; color: #0f172a; border: none; padding: 13px; border-radius: 8px; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: background-color 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px;">
        <span>Access Dashboard</span> <i class="fa-solid fa-right-to-bracket"></i>
      </button>

      <div style="text-align: center; font-size: 0.85rem;">
        <span style="color: #64748b;">Don't have an account?</span>
        <a href="register.html" style="color: #38bdf8; text-decoration: none; font-weight: 600; margin-left: 4px;">Register here</a>
      </div>

    </form>
  </div>

  <script>
    // Interactive Password View Field State Toggle Handler
    function toggleLoginPassword() {
      const field = document.getElementById("login-password");
      const icon = document.getElementById("toggle-login-pass");
      
      if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
        icon.style.color = "#38bdf8";
      } else {
        field.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
        icon.style.color = "#64748b";
      }
    }

    // Handles inline warning alerts
    function triggerNotification(message, type = "error") {
      const banner = document.getElementById("custom-alert-banner");
      banner.style.display = "block";
      
      if (type === "error") {
        banner.style.backgroundColor = "rgba(239, 68, 68, 0.12)";
        banner.style.color = "#f87171";
        banner.style.border = "1px solid rgba(239, 68, 68, 0.25)";
      } else {
        banner.style.backgroundColor = "rgba(16, 185, 129, 0.12)";
        banner.style.color = "#34d399";
        banner.style.border = "1px solid rgba(16, 185, 129, 0.25)";
      }
      
      banner.innerHTML = message;
    }

    function executePublicLogin(event) {
      event.preventDefault();
      document.getElementById("custom-alert-banner").style.display = "none";

      const usernameInput = document.getElementById("login-username").value.trim().toLowerCase();
      const passwordInput = document.getElementById("login-password").value;

      // Access memory allocations cluster 
      const systemDatabase = JSON.parse(localStorage.getItem("app_user_database")) || [];

      // Search database array for profile matches
      const matchedAccount = systemDatabase.find(account => account.username.toLowerCase() === usernameInput);

      if (!matchedAccount) {
        triggerNotification("<i class='fa-solid fa-circle-exclamation'></i> <strong>Access Denied:</strong> Invalid credentials. Please check your spelling or register.");
        return;
      }

      // Cryptographic exact character matching comparison check
      if (matchedAccount.password !== passwordInput) {
        triggerNotification("<i class='fa-solid fa-circle-exclamation'></i> <strong>Access Denied:</strong> Invalid credentials. Please try again.");
        return;
      }

      // Enforce Administrative Gatekeeper Validation State Rules
      if (matchedAccount.status === "Pending") {
        triggerNotification("<i class='fa-solid fa-clock-rotate-left'></i> <strong>Account Locked:</strong> Your profile is waiting for administrative verification. Please contact your system moderator.");
        return;
      }

      // Security Protocol: Track the logged-in session profile state for the dashboard
      localStorage.setItem("authenticated_current_user", JSON.stringify(matchedAccount));

      // Visual success confirmation notice
      triggerNotification("<i class='fa-solid fa-shield-check'></i> <strong>Verification Approved!</strong> Access authorized. Redirecting...", "success");

      // Transfer execution stack safely into user profile scope environment 
      setTimeout(() => {
        window.location.href = "user_dashboard.html";
      }, 1200);
    }
  </script>
</body>
</html>
