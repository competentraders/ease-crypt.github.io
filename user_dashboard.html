<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Enterprise Asset Management Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Premium Sliding Drawer Animation Classes */
    .hamburger-drawer {
      position: fixed;
      top: 0;
      left: -360px;
      width: 360px;
      height: 100%;
      background-color: #0f172a;
      border-right: 1px solid #1e293b;
      box-shadow: 25px 0 50px -12px rgba(0, 0, 0, 0.7);
      z-index: 1000;
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    .hamburger-drawer.open {
      left: 0 !important;
    }
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(4px);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.visible {
      opacity: 1 !important;
      pointer-events: auto !important;
    }
    /* Smooth Scroll Bar overrides for Custom Assets List */
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
      height: 4px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    
    /* Filter tab styling */
    .market-tab {
      background-color: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .market-tab.active {
      background-color: #38bdf8;
      color: #0f172a;
      border-color: #38bdf8;
    }
    
    /* Price update pulse animations */
    @keyframes priceUp {
      0% { color: #10b981; background-color: rgba(16, 185, 129, 0.15); }
      100% { color: #10b981; background-color: transparent; }
    }
    @keyframes priceDown {
      0% { color: #ef4444; background-color: rgba(239, 68, 68, 0.15); }
      100% { color: #ef4444; background-color: transparent; }
    }
    .flash-up { animation: priceUp 0.6s ease-out; }
    .flash-down { animation: priceDown 0.6s ease-out; }
  </style>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #060913; color: #f8fafc; min-height: 100vh; box-sizing: border-box;">

  <div id="menu-overlay" class="drawer-overlay" onclick="toggleCryptoMenu()"></div>

  <div id="crypto-drawer" class="hamburger-drawer">
    <div style="padding: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-tags" style="color: #38bdf8; font-size: 1.1rem;"></i>
        <h3 style="margin: 0; font-size: 1.1rem; color: #f1f5f9; font-weight: 700;">EASE-CRYPT MARKET PRICE</h3>
      </div>
      <button onclick="toggleCryptoMenu()" style="background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.2rem;"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div style="padding: 12px 16px; background-color: #0b0f19; border-bottom: 1px solid #1e293b; display: flex; gap: 8px; overflow-x: auto;" class="custom-scroll">
      <button class="market-tab active" id="tab-ALL" onclick="switchMarketTab('ALL')">All Markets</button>
      <button class="market-tab" id="tab-CRYPTO" onclick="switchMarketTab('CRYPTO')">Crypto</button>
      <button class="market-tab" id="tab-STOCKS" onclick="switchMarketTab('STOCKS')">Stocks/Indices</button>
      <button class="market-tab" id="tab-COMMODITIES" onclick="switchMarketTab('COMMODITIES')">Commodities</button>
      <button class="market-tab" id="tab-FOREX" onclick="switchMarketTab('FOREX')">Forex</button>
    </div>

    <div style="padding: 16px; border-bottom: 1px solid #1e293b; background-color: #0b0f19;">
      <div style="position: relative;">
        <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 0.85rem;"></i>
        <input type="text" id="crypto-search" oninput="renderMatrixCards(this.value)" style="width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px 10px 36px; color: #f8fafc; font-size: 0.85rem; box-sizing: border-box; outline: none;" placeholder="Search real assets...">
      </div>
    </div>

    <div id="crypto-grid" class="custom-scroll" style="flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;">
    </div>
  </div>

  <nav style="background-color: #0f172a; border-bottom: 1px solid #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 900;">
    <div style="display: flex; align-items: center; gap: 18px;">
      <button onclick="toggleCryptoMenu()" style="background-color: #1e293b; border: 1px solid #334155; color: #f1f5f9; padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.85rem; transition: background 0.2s;">
        <i class="fa-solid fa-bars" style="font-size: 1rem; color: #38bdf8;"></i> <span>ease-crypt</span>
      </button>
      <div style="display: flex; align-items: center; gap: 10px;">
        <div style="width: 32px; height: 32px; background-color: rgba(56, 189, 248, 0.12); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
          <i class="fa-solid fa-shield-halved" style="color: #38bdf8; font-size: 1rem;"></i>
        </div>
        <h1 style="margin: 0; font-size: 1.1rem; font-weight: 700; color: #f1f5f9; letter-spacing: -0.3px;">Ease-crypt</h1>
      </div>
    </div>
    
    <button onclick="terminateUserSession()" style="background-color: rgba(239, 68, 68, 0.08); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s;">
      <i class="fa-solid fa-right-from-bracket"></i> <span><a href="login.html" style="color: inherit; text-decoration: none;">Log Out</a></span>
    </button>
  </nav>

  <main style="max-width: 1200px; margin: 32px auto; padding: 0 16px; box-sizing: border-box;">
    
    <div style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 1px solid #334155; border-radius: 16px; padding: 28px; margin-bottom: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px;">
      <div style="flex: 1; min-width: 280px;">
        <h2 style="margin: 0; font-size: 1.6rem; color: #ffffff; font-weight: 800; letter-spacing: -0.4px;">Welcome Back, <span id="dash-display-fullname" style="color: #38bdf8;">User</span>!</h2>
        <p style="margin: 6px 0 0 0; font-size: 0.9rem; color: #10b981; font-weight: 600;">Account Status: Verified Instant buy.</p>
      </div>
      <div style="display: flex; gap: 12px; min-width: 280px; width: auto; flex-wrap: nowrap; align-items: center;">
        <a href="deposit.html" style="flex: 1; text-align: center; background-color: #38bdf8; color: #0f172a; text-decoration: none; font-size: 0.88rem; font-weight: 700; padding: 12px 20px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; white-space: nowrap; border: 1px solid #38bdf8;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
          <i class="fa-solid fa-wallet"></i> <span>Deposit</span>
        </a>
        <a href="withdraw.html" style="flex: 1; text-align: center; background-color: #1e293b; color: #f8fafc; text-decoration: none; font-size: 0.88rem; font-weight: 700; padding: 12px 20px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid #334155;">
          <i class="fa-solid fa-money-bill-transfer" style="color: #38bdf8;"></i> <span>Withdraw</span>
        </a>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 32px; align-items: start;">
      <div style="display: flex; flex-direction: column; gap: 24px;">
        <div style="background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; position: relative; overflow: hidden;">
          <div style="position: absolute; right: -20px; bottom: -20px; font-size: 8rem; color: rgba(51, 65, 85, 0.12); pointer-events: none;"><i class="fa-solid fa-vault"></i></div>
          <div style="position: relative; z-index: 2;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
              <i class="fa-solid fa-wallet" style="color: #64748b;"></i>
              <span style="font-size: 0.78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;">Live Account Balance</span>
            </div>
            <h3 style="margin: 0; font-size: 2.3rem; font-weight: 800; color: #ffffff;">$0.00</h3>
          </div>
        </div>
        <div style="background-color: #0f172a; border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 16px; padding: 24px; position: relative; overflow: hidden;">
          <div style="position: relative; z-index: 2;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
              <i class="fa-solid fa-circle-dollar-to-slot" style="color: #38bdf8;"></i>
              <span style="font-size: 0.78rem; font-weight: 700; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px;">New User rewards</span>
            </div>
            <h3 style="margin: 0; font-size: 1.8rem; font-weight: 800; color: #38bdf8;">$3.00</h3>
          </div>
        </div>
      </div>

      <div style="background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 28px;">
        <h3 style="margin: 0 0 20px 0; font-size: 1.1rem; color: #f1f5f9; border-bottom: 1px solid #1e293b; padding-bottom: 12px; display: flex; align-items: center; gap: 10px;">
          <i class="fa-solid fa-user-gear" style="color: #64748b;"></i> Authenticated Profile
        </h3>
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <span style="display: block; font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">Account Handle Identifier</span>
            <span id="dash-meta-username" style="font-size: 0.95rem; color: #f8fafc; font-weight: 600; background-color: #060913; padding: 6px 12px; border-radius: 6px; display: inline-block; border: 1px solid #1e293b;">-</span>
          </div>
          <div>
            <span style="display: block; font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">Registered Email</span>
            <span id="dash-meta-email" style="font-size: 0.95rem; color: #f8fafc;">-</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const cryptoAssets = [
        { id: 1, name: "Bitcoin", ticker: "BTC", basePrice: 64200.00, icon: "fa-brands fa-bitcoin", color: "#f59e0b", cat: "CRYPTO", trend: "up" },
        { id: 2, name: "Ethereum", ticker: "ETH", basePrice: 3450.00, icon: "fa-brands fa-ethereum", color: "#6366f1", cat: "CRYPTO", trend: "up" },
        { id: 3, name: "Solana", ticker: "SOL", basePrice: 145.10, icon: "fa-solid fa-cube", color: "#a855f7", cat: "CRYPTO", trend: "down" },
        { id: 4, name: "Binance Coin", ticker: "BNB", basePrice: 580.25, icon: "fa-solid fa-coins", color: "#f39c12", cat: "CRYPTO", trend: "up" },
        { id: 5, name: "Ripple", ticker: "XRP", basePrice: 0.49, icon: "fa-solid fa-circle-nodes", color: "#23a2f6", cat: "CRYPTO", trend: "down" },
        { id: 6, name: "Cardano", ticker: "ADA", basePrice: 0.38, icon: "fa-solid fa-snowflake", color: "#0033ad", cat: "CRYPTO", trend: "up" },
        { id: 7, name: "Dogecoin", ticker: "DOGE", basePrice: 0.12, icon: "fa-solid fa-paw", color: "#ba9f33", cat: "CRYPTO", trend: "down" },
        { id: 8, name: "Tron", ticker: "TRX", basePrice: 0.12, icon: "fa-solid fa-diamond", color: "#ef4444", cat: "CRYPTO", trend: "up" },
        { id: 9, name: "Avalanche", ticker: "AVAX", basePrice: 28.75, icon: "fa-solid fa-mountain", color: "#e74c3c", cat: "CRYPTO", trend: "down" },
        { id: 10, name: "Polkadot", ticker: "DOT", basePrice: 5.90, icon: "fa-solid fa-ellipsis-vertical", color: "#e6007a", cat: "CRYPTO", trend: "up" },
        { id: 45, name: "S&P 500 Index", ticker: "SPX", basePrice: 5432.20, icon: "fa-solid fa-chart-line", color: "#10b981", cat: "STOCKS", trend: "up" },
        { id: 46, name: "Nasdaq 100", ticker: "NDX", basePrice: 19650.80, icon: "fa-solid fa-chart-column", color: "#38bdf8", cat: "STOCKS", trend: "up" },
        { id: 48, name: "Apple Inc.", ticker: "AAPL", basePrice: 214.30, icon: "fa-brands fa-apple", color: "#f8fafc", cat: "STOCKS", trend: "down" },
        { id: 49, name: "Microsoft Corp.", ticker: "MSFT", basePrice: 442.15, icon: "fa-brands fa-windows", color: "#00a4ef", cat: "STOCKS", trend: "up" },
        { id: 50, name: "NVIDIA Corporation", ticker: "NVDA", basePrice: 127.40, icon: "fa-solid fa-microchip", color: "#76b900", cat: "STOCKS", trend: "up" },
        { id: 76, name: "Gold Spot", ticker: "XAU", basePrice: 2335.50, icon: "fa-solid fa-cubes", color: "#fbbf24", cat: "COMMODITIES", trend: "up" },
        { id: 77, name: "Silver Spot", ticker: "XAG", basePrice: 29.45, icon: "fa-solid fa-circle", color: "#9ca3af", cat: "COMMODITIES", trend: "down" },
        { id: 78, name: "Crude Oil Brent", ticker: "BRENT", basePrice: 85.20, icon: "fa-solid fa-droplet", color: "#e74c3c", cat: "COMMODITIES", trend: "up" },
        { id: 86, name: "Euro / US Dollar", ticker: "EURUSD", basePrice: 1.0745, icon: "fa-solid fa-money-bill-transfer", color: "#3b82f6", cat: "FOREX", trend: "down" },
        { id: 87, name: "Pound / US Dollar", ticker: "GBPUSD", basePrice: 1.2685, icon: "fa-solid fa-money-bill-transfer", color: "#10b981", cat: "FOREX", trend: "up" },
        { id: 88, name: "US Dollar / Japanese Yen", ticker: "USDJPY", basePrice: 157.95, icon: "fa-solid fa-money-bill-transfer", color: "#ef4444", cat: "FOREX", trend: "up" }
    ];

    const SPREAD_MARGIN_RATE = (65000 - 61000) / 65000;
    let selectedCategory = "ALL";
    let lastFilterString = "";

    function toggleCryptoMenu() {
      document.getElementById("crypto-drawer").classList.toggle("open");
      document.getElementById("menu-overlay").classList.toggle("visible");
    }

    function switchMarketTab(category) {
      selectedCategory = category;
      document.querySelectorAll('.market-tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${category}`).classList.add('active');
      renderMatrixCards();
    }

    // High Performance 1-Second Price Engine
    function initializePriceTickSimulation() {
      setInterval(() => {
        // Randomly pick 5-8 assets to fluctuate every second
        const countToUpdate = Math.floor(Math.random() * 4) + 5;
        
        for (let i = 0; i < countToUpdate; i++) {
          const randomIndex = Math.floor(Math.random() * cryptoAssets.length);
          const asset = cryptoAssets[randomIndex];
          
          const changePercent = (Math.random() * 0.24 - 0.12) / 100; // -0.12% to +0.12%
          const oldPrice = asset.basePrice;
          asset.basePrice = oldPrice * (1 + changePercent);
          asset.trend = changePercent >= 0 ? "up" : "down";

          // Dynamically target and pulse elements without re-rendering structures
          updateNodePriceDisplay(asset, asset.basePrice > oldPrice);
        }
      }, 1000); // 1 Second Tickers
    }

    function updateNodePriceDisplay(asset, isUpward) {
      const discountPrice = asset.basePrice * (1 - SPREAD_MARGIN_RATE);
      let precision = asset.basePrice < 1.0 ? (asset.basePrice < 0.001 ? 6 : 4) : 2;

      const discountNode = document.getElementById(`disc-price-${asset.id}`);
      const spotNode = document.getElementById(`spot-price-${asset.id}`);
      const pulseWrapper = document.getElementById(`price-wrapper-${asset.id}`);
      const sparklineNode = document.getElementById(`sparkline-${asset.id}`);

      if (discountNode && spotNode && pulseWrapper && sparklineNode) {
        discountNode.textContent = `$${discountPrice.toFixed(precision)}`;
        spotNode.textContent = `$${asset.basePrice.toFixed(precision)}`;
        
        // Update Sparkline Trend Icon
        if (asset.trend === "up") {
          sparklineNode.className = "fa-solid fa-chart-line";
          sparklineNode.style.color = "#ef4444"; // Red for upward trending shorts/buys
        } else {
          sparklineNode.className = "fa-solid fa-chart-line-down";
          sparklineNode.style.color = "#10b981"; // Green for drops
        }

        // Apply Flash Animation
        pulseWrapper.classList.remove('flash-up', 'flash-down');
        void pulseWrapper.offsetWidth; // Force Reflow
        pulseWrapper.classList.add(isUpward ? 'flash-up' : 'flash-down');
      }
    }

    function renderMatrixCards(filterString = lastFilterString) {
      const gridContainer = document.getElementById('crypto-grid');
      if (!gridContainer) return;
      
      lastFilterString = filterString;
      
      const matchedTokens = cryptoAssets.filter(token => {
        const matchesCategory = (selectedCategory === "ALL" || token.cat === selectedCategory);
        const matchesSearch = token.name.toLowerCase().includes(filterString.toLowerCase()) || 
                             token.ticker.toLowerCase().includes(filterString.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      if (matchedTokens.length === 0) {
        gridContainer.innerHTML = `<div style="text-align: center; padding: 40px; color: #475569; font-size: 0.85rem;">No assets found.</div>`;
        return;
      }

      matchedTokens.forEach(token => {
        const containerId = `asset-row-${token.id}`;
        let tokenItem = document.getElementById(containerId);
        let precision = token.basePrice < 1.0 ? (token.basePrice < 0.001 ? 6 : 4) : 2;

        if (!tokenItem) {
          tokenItem = document.createElement("div");
          tokenItem.id = containerId;
          tokenItem.style.backgroundColor = "#1e293b";
          tokenItem.style.border = "1px solid #334155";
          tokenItem.style.borderRadius = "10px";
          tokenItem.style.padding = "12px";
          tokenItem.style.display = "flex";
          tokenItem.style.justifyContent = "space-between";
          tokenItem.style.alignItems = "center";
          tokenItem.style.boxSizing = "border-box";
          gridContainer.appendChild(tokenItem);
        }

        const discountPrice = token.basePrice * (1 - SPREAD_MARGIN_RATE);
        const graphIcon = token.trend === "up" ? "fa-chart-line" : "fa-chart-line-down";
        const graphColor = token.trend === "up" ? "#ef4444" : "#10b981";

        tokenItem.innerHTML = `
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: ${token.color};">
              <i class="${token.icon}"></i>
            </div>
            <div>
              <div style="display: flex; align-items: center; gap: 6px;">
                <h4 style="margin: 0; font-size: 0.85rem; color: #f1f5f9; font-weight: 600;">${token.name}</h4>
                <i id="sparkline-${token.id}" class="fa-solid ${graphIcon}" style="font-size: 0.75rem; color: ${graphColor}; transition: all 0.2s;"></i>
              </div>
              <span style="font-size: 0.72rem; color: #64748b; font-family: monospace;">${token.ticker}</span>
            </div>
          </div>
          <div id="price-wrapper-${token.id}" style="text-align: right; display: flex; flex-direction: column; gap: 2px; align-items: flex-end; padding: 2px 6px; border-radius: 4px;">
            <div id="disc-price-${token.id}" style="font-size: 0.88rem; color: #10b981; font-weight: 700;">$${discountPrice.toFixed(precision)}</div>
            <div id="spot-price-${token.id}" style="font-size: 0.7rem; color: #64748b; text-decoration: line-through;">$${token.basePrice.toFixed(precision)}</div>
            <a href="deposit.html" style="background-color: #38bdf8; color: #0f172a; text-decoration: none; font-size: 0.72rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; margin-top: 2px;">
              Buy
            </a>
          </div>
        `;
      });

      // Structural sanitation
      Array.from(gridContainer.children).forEach(child => {
        const structuralId = parseInt(child.id.replace('asset-row-', ''));
        if(!matchedTokens.some(t => t.id === structuralId)) child.remove();
      });
    }

    function parseSecureUserContext() {
      let currentUserData = JSON.parse(localStorage.getItem("authenticated_current_user")) || {
        fullName: "Oreva", username: "oreva_dev", email: "oreva@competenttraders.com"
      };

      if(document.getElementById("dash-display-fullname")) document.getElementById("dash-display-fullname").textContent = currentUserData.fullName;
      if(document.getElementById("dash-meta-username")) document.getElementById("dash-meta-username").textContent = "@" + currentUserData.username;
      if(document.getElementById("dash-meta-email")) document.getElementById("dash-meta-email").textContent = currentUserData.email;

      renderMatrixCards();
      initializePriceTickSimulation();
    }

    document.addEventListener("DOMContentLoaded", parseSecureUserContext);
  </script>
</body>
</html>
