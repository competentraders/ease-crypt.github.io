<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Trading Terminal</title>
  <!-- Icon Libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #131722;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e1e6eb;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }

    /* Mobile Vertical Stack Layout Engine */
    .mobile-terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* 1. Header Infrastructure Node */
    .header-node {
      background-color: #1c2030;
      border-bottom: 1px solid #242936;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .header-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* Interactive Asset Selector Element */
    .asset-branding {
      display: flex;
      align-items: center;
      gap: 6px;
      background-color: #131722;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #242936;
      width: 58%;
    }
    .asset-icon-display {
      font-size: 13px;
      width: 16px;
      text-align: center;
    }
    .asset-select {
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      text-overflow: ellipsis;
    }
    .asset-select option {
      background-color: #1c2030;
      color: #ffffff;
    }
    .live-price-badge { font-family: monospace; font-size: 14px; font-weight: 800; text-align: right; }
    
    /* Dedicated Mobile Funding Suite Links */
    .mobile-funding-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .funding-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 4px;
      transition: opacity 0.15s ease;
    }
    .lnk-deposit { background-color: #00b09b; color: #ffffff; }
    .lnk-withdraw { background-color: rgba(240, 185, 11, 0.1); color: #f0b90b; border: 1px solid rgba(240, 185, 11, 0.3); }
    .funding-link:active { opacity: 0.7; }

    /* 2. Chart Screen Workspace Block */
    .chart-viewport-box {
      flex: 1;
      background-color: #131722;
      position: relative;
      border-bottom: 1px solid #242936;
    }

    /* 3. Split Component Data Row */
    .split-data-hub {
      height: 255px; /* Precision sized for full viewport allocation */
      background-color: #161a25;
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      border-bottom: 1px solid #242936;
    }

    /* Mobile Orderbook View */
    .compact-orderbook {
      border-right: 1px solid #242936;
      display: flex;
      flex-direction: column;
      padding: 4px 0;
      font-family: monospace;
      font-size: 10px;
    }
    .ob-stream-header {
      display: flex;
      justify-content: space-between;
      color: #5d6580;
      padding: 0 8px 4px 8px;
      font-weight: bold;
    }
    .ob-row-mobile {
      display: flex;
      justify-content: space-between;
      padding: 2px 8px;
    }
    .ob-price-lbl { font-weight: bold; }
    .ob-amt-lbl { color: #b5b9c4; }
    .color-up { color: #26a69a; }
    .color-down { color: #ef5350; }

    .mid-spread-strip {
      background-color: #131722;
      padding: 3px 8px;
      font-weight: bold;
      text-align: center;
      border-top: 1px solid #242936;
      border-bottom: 1px solid #242936;
      font-size: 11px;
    }

    /* Mobile Form Ticket Box with Parameters */
    .mobile-ticket-form {
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #131722;
      position: relative;
    }
    .action-type-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background-color: #161a25;
      border-radius: 4px;
      padding: 2px;
      margin-bottom: 4px;
    }
    .tab-btn {
      border: none;
      background: transparent;
      color: #787f99;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 0;
      border-radius: 3px;
      cursor: pointer;
    }
    .tab-btn.active-buy { background-color: #26a69a; color: white; }
    .tab-btn.active-sell { background-color: #ef5350; color: white; }

    .form-input-element {
      display: flex;
      background-color: #1c2030;
      border: 1px solid #242936;
      border-radius: 4px;
      margin-bottom: 4px;
      align-items: center;
      padding: 0 6px;
    }
    .form-lbl { font-size: 9px; color: #787f99; font-weight: bold; width: 28px; text-transform: uppercase; }
    .form-input {
      background: transparent;
      border: none;
      width: 100%;
      color: #ffffff;
      padding: 4px;
      font-family: monospace;
      text-align: right;
      outline: none;
      font-size: 11px;
    }
    .asset-label { font-size: 9px; color: #787f99; font-weight: bold; padding-left: 2px; text-transform: uppercase; }

    /* Balance Row Elements */
    .ticket-balance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      color: #9aa4bf;
      padding: 2px 2px;
      font-weight: 600;
    }
    .balance-highlight { color: #f0b90b; font-family: monospace; font-weight: 700; }

    /* In-Terminal Embedded Toast Banner */
    .terminal-error-toast {
      background-color: rgba(239, 83, 80, 0.15);
      border: 1px solid rgba(239, 83, 80, 0.3);
      color: #ef5350;
      font-size: 9px;
      font-weight: bold;
      text-align: center;
      padding: 4px;
      border-radius: 4px;
      margin-bottom: 4px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }
    .terminal-error-toast.show-toast { opacity: 1; visibility: visible; }

    /* Compact UI Action Submit Button */
    .action-submit-btn {
      width: 100%;
      padding: 6px 0;
      background: #26a69a;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(38, 166, 154, 0.15);
    }
    .action-submit-btn.sell-mode { background: #ef5350; box-shadow: 0 1px 3px rgba(239, 83, 80, 0.15); }
    .action-submit-btn:active { opacity: 0.8; }

    /* 4. Mini Footer Position Bar */
    .mini-pos-bar {
      height: 30px;
      background-color: #1c2030;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 10px;
      color: #787f99;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="mobile-terminal">
    
    <!-- 1. Header Infrastructure Node -->
    <header class="header-node">
      <div class="header-top-row">
        <div class="asset-branding">
          <!-- Dynamic Icon Element -->
          <span id="active-asset-icon" class="asset-icon-display"></span>
          <select id="asset-selector" class="asset-select" onchange="handleAssetChange(this.value)"></select>
        </div>
        <div id="m-live-price" class="live-price-badge color-up">--</div>
      </div>
      
      <!-- Funding Targets Links -->
      <div class="mobile-funding-box">
        <a href="deposit.html" class="funding-link lnk-deposit">
          <i class="fa-solid fa-wallet"></i> Deposit
        </a>
        <a href="withdraw.html" class="funding-link lnk-withdraw">
          <i class="fa-solid fa-money-bill-transfer"></i> Withdraw
        </a>
      </div>
    </header>

    <!-- 2. Chart Screen Workspace Block -->
    <section class="chart-viewport-box">
      <div id="tradingview_mobile_chart" style="width: 100%; height: 100%;"></div>
    </section>

    <!-- 3. Dual-Channel Component Data Deck Frame -->
    <section class="split-data-hub">
      
      <!-- Dynamic Orderbook Node -->
      <div class="compact-orderbook">
        <div class="ob-stream-header">
          <span>Price</span>
          <span id="ob-size-header">Size</span>
        </div>
        <div id="m-asks-container" style="display:flex; flex-direction:column-reverse; flex:1; justify-content:end;"></div>
        <div class="mid-spread-strip color-up" id="m-spread-price">--</div>
        <div id="m-bids-container" style="flex:1;"></div>
      </div>

      <!-- Advanced Order Ticket Box with Parameters -->
      <div class="mobile-ticket-form">
        <div>
          <!-- Buy / Sell Toggle Tabs -->
          <div class="action-type-tabs">
            <button id="tab-buy" class="tab-btn active-buy" onclick="setTradeMode('buy')">Buy</button>
            <button id="tab-sell" class="tab-btn" onclick="setTradeMode('sell')">Sell</button>
          </div>

          <!-- Price Input Row -->
          <div class="form-input-element">
            <span class="form-lbl">Price</span>
            <input type="text" class="form-input" value="--" id="form-price-val" disabled>
          </div>

          <!-- Lots/Size Input Row -->
          <div class="form-input-element">
            <span class="form-lbl">Lots</span>
            <input type="number" class="form-input" value="1.00" id="form-amount-input" step="0.1">
            <span id="form-asset-token" class="asset-label">--</span>
          </div>

          <!-- Pips Deviation Setup Row -->
          <div class="form-input-element">
            <span class="form-lbl">Pips</span>
            <input type="number" class="form-input" value="10" id="form-pips-input" step="1">
            <span class="asset-label">step</span>
          </div>

          <!-- Stop Loss Setup Row -->
          <div class="form-input-element">
            <span class="form-lbl" style="color: #ef5350;">S / L</span>
            <input type="number" class="form-input" placeholder="0.00" id="form-sl-input" step="0.01">
            <span class="asset-label">val</span>
          </div>

          <!-- Take Profit Setup Row -->
          <div class="form-input-element">
            <span class="form-lbl" style="color: #26a69a;">T / P</span>
            <input type="number" class="form-input" placeholder="0.00" id="form-tp-input" step="0.01">
            <span class="asset-label">val</span>
          </div>
        </div>

        <div>
          <!-- Core User Balance Dashboard Metadata -->
          <div class="ticket-balance-row">
            <span>Available Balance:</span>
            <span class="balance-highlight">$0,00</span>
          </div>

          <!-- Native App Toast Notification Module -->
          <div id="balance-error-toast" class="terminal-error-toast">
            <i class="fa-solid fa-triangle-exclamation"></i> Insufficient Balance
          </div>

          <!-- High-Compact Compressed Action Button -->
          <button id="submit-order-btn" class="action-submit-btn" onclick="executeTerminalOrder()">Buy Long</button>
        </div>
      </div>

    </section>

    <!-- 4. Structural Mobile Mini Footer Bar -->
    <footer class="mini-pos-bar">
      <span><i class="fa-solid fa-folder-open" style="margin-right:4px;"></i> Positions (0)</span>
      <span style="font-family:monospace; font-size:10px; color:#475569;">MULTI-ASSET NODE</span>
    </footer>

  </div>

  <!-- TradingView Base Integration Script -->
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script type="text/javascript">
    
    // Comprehensive Institutional 102 Market Dataset Matrix with Assigned Icon Classes
    const marketAssetConfig = {
      // === COMMODITIES & INDICES ===
      "XAUUSD": { label: "GOLD / USD (XAU)", basePrice: 2342.50, stepSize: 0.45, decimals: 2, tvSymbol: "TVC:GOLD", unit: "oz", icon: "fa-solid fa-cubes", iconColor: "#f59e0b" },
      "XAGUSD": { label: "SILVER / USD (XAG)", basePrice: 28.40, stepSize: 0.015, decimals: 2, tvSymbol: "TVC:SILVER", unit: "oz", icon: "fa-solid fa-circle", iconColor: "#94a3b8" },
      "USOIL": { label: "Crude Oil (WTI)", basePrice: 78.25, stepSize: 0.03, decimals: 2, tvSymbol: "TVC:USOIL", unit: "bbl", icon: "fa-solid fa-droplet", iconColor: "#334155" },
      "UKOIL": { label: "Brent Oil", basePrice: 82.60, stepSize: 0.03, decimals: 2, tvSymbol: "TVC:UKOIL", unit: "bbl", icon: "fa-solid fa-fire", iconColor: "#f97316" },
      
      // === CRYPTOCURRENCIES ===
      "BTC": { label: "BTC / USDT (Bitcoin)", basePrice: 96450.25, stepSize: 4.5, decimals: 2, tvSymbol: "BINANCE:BTCUSDT", unit: "btc", icon: "fa-brands fa-bitcoin", iconColor: "#f59e0b" },
      "ETH": { label: "ETH / USDT (Ethereum)", basePrice: 3120.50, stepSize: 0.35, decimals: 2, tvSymbol: "BINANCE:ETHUSDT", unit: "eth", icon: "fa-brands fa-ethereum", iconColor: "#6366f1" },
      "SOL": { label: "SOL / USDT (Solana)", basePrice: 184.25, stepSize: 0.05, decimals: 2, tvSymbol: "BINANCE:SOLUSDT", unit: "sol", icon: "fa-solid fa-bolt", iconColor: "#a855f7" },

      // === FOREX MAJORS ===
      "EURUSD": { label: "EUR / USD (Euro)", basePrice: 1.08420, stepSize: 0.00015, decimals: 5, tvSymbol: "FX:EURUSD", unit: "lots", icon: "fa-solid fa-coins", iconColor: "#3b82f6" },
      "GBPUSD": { label: "GBP / USD (Pound)", basePrice: 1.26340, stepSize: 0.00018, decimals: 5, tvSymbol: "FX:GBPUSD", unit: "lots", icon: "fa-solid fa-sterling-sign", iconColor: "#10b981" },
      "USDJPY": { label: "USD / JPY (Yen)", basePrice: 151.420, stepSize: 0.025, decimals: 3, tvSymbol: "FX:USDJPY", unit: "lots", icon: "fa-solid fa-yen-sign", iconColor: "#ef4444" }
    };

    let selectedToken = "XAUUSD"; // Default setup initialized to Gold
    let coreGlobalPriceVal = marketAssetConfig[selectedToken].basePrice;
    let activeTradeMode = "buy";
    let currentWidgetInstance = null;

    // Build option structures and synchronize branding icons
    function initializeAssetDropdownEngine() {
      const selectBox = document.getElementById("asset-selector");
      if(!selectBox) return;

      let htmlBuffer = "";
      for (const [key, config] of Object.entries(marketAssetConfig)) {
        htmlBuffer += `<option value="${key}">${config.label}</option>`;
      }
      selectBox.innerHTML = htmlBuffer;
      selectBox.value = selectedToken;
      updateAssetBrandingIcon();
    }

    function updateAssetBrandingIcon() {
      const currentConfig = marketAssetConfig[selectedToken];
      const iconEl = document.getElementById("active-asset-icon");
      if (iconEl && currentConfig) {
        iconEl.className = `asset-icon-display ${currentConfig.icon}`;
        iconEl.style.color = currentConfig.iconColor;
      }
    }

    function loadTradingViewWidget(symbolString) {
      currentWidgetInstance = new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "symbol": symbolString,
        "interval": "5",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#131722",
        "enable_publishing": false,
        "hide_side_toolbar": true,
        "allow_symbol_change": false,
        "container_id": "tradingview_mobile_chart",
        "studies": ["MASimple@tv-basicstudies"]
      });
    }

    function handleAssetChange(newToken) {
      selectedToken = newToken;
      const config = marketAssetConfig[selectedToken];
      coreGlobalPriceVal = config.basePrice;
      
      document.getElementById("form-asset-token").textContent = config.unit;
      document.getElementById("ob-size-header").textContent = `Size(${config.unit})`;

      updateAssetBrandingIcon();
      loadTradingViewWidget(config.tvSymbol);
      buildMobileOrderbookStream();
    }

    function setTradeMode(mode) {
      activeTradeMode = mode;
      const buyTab = document.getElementById("tab-buy");
      const sellTab = document.getElementById("tab-sell");
      const actionBtn = document.getElementById("submit-order-btn");

      if (mode === 'buy') {
        buyTab.className = "tab-btn active-buy";
        sellTab.className = "tab-btn";
        actionBtn.className = "action-submit-btn";
        actionBtn.textContent = "Buy Long";
      } else {
        buyTab.className = "tab-btn";
        sellTab.className = "tab-btn active-sell";
        actionBtn.className = "action-submit-btn sell-mode";
        actionBtn.textContent = "Sell Short";
      }
    }

    // Interactive custom app-level notification execution pipeline
    function executeTerminalOrder() {
      const toast = document.getElementById("balance-error-toast");
      if(!toast) return;

      toast.classList.add("show-toast");
      
      setTimeout(() => {
        toast.classList.remove("show-toast");
      }, 2500);
    }

    function buildMobileOrderbookStream() {
      const askWrapper = document.getElementById("m-asks-container");
      const bidWrapper = document.getElementById("m-bids-container");
      if(!askWrapper || !bidWrapper) return;

      askWrapper.innerHTML = "";
      bidWrapper.innerHTML = "";
      
      const config = marketAssetConfig[selectedToken];

      for(let i = 3; i > 0; i--) {
        let price = coreGlobalPriceVal + (i * config.stepSize) + (Math.random() * (config.stepSize * 0.15));
        let size = (Math.random() * 25 + 0.5).toFixed(1);
        askWrapper.innerHTML += `
          <div class="ob-row-mobile">
            <span class="ob-price-lbl color-down">${price.toFixed(config.decimals)}</span>
            <span class="ob-amt-lbl">${size}</span>
          </div>
        `;
      }

      for(let i = 1; i <= 3; i++) {
        let price = coreGlobalPriceVal - (i * config.stepSize) - (Math.random() * (config.stepSize * 0.15));
        let size = (Math.random() * 25 + 0.5).toFixed(1);
        bidWrapper.innerHTML += `
          <div class="ob-row-mobile">
            <span class="ob-price-lbl color-up">${price.toFixed(config.decimals)}</span>
            <span class="ob-amt-lbl">${size}</span>
          </div>
        `;
      }
    }

    function stepFluctuationTickLoop() {
      const config = marketAssetConfig[selectedToken];
      const variance = (Math.random() * config.stepSize * 2) - config.stepSize;
      coreGlobalPriceVal += variance;

      const elementPriceHead = document.getElementById("m-live-price");
      const elementPriceSpread = document.getElementById("m-spread-price");
      const elementInputPrice = document.getElementById("form-price-val");

      if(elementPriceHead && elementPriceSpread) {
        elementPriceHead.textContent = coreGlobalPriceVal.toFixed(config.decimals);
        elementPriceSpread.textContent = coreGlobalPriceVal.toFixed(config.decimals);
        if(elementInputPrice) elementInputPrice.value = coreGlobalPriceVal.toFixed(config.decimals);

        if(variance > 0) {
          elementPriceHead.className = "live-price-badge color-up";
          elementPriceSpread.className = "mid-spread-strip color-up";
        } else {
          elementPriceHead.className = "live-price-badge color-down";
          elementPriceSpread.className = "mid-spread-strip color-down";
        }
      }

      buildMobileOrderbookStream();
      setTimeout(stepFluctuationTickLoop, Math.floor(Math.random() * 800) + 600);
    }

    document.addEventListener("DOMContentLoaded", () => {
      initializeAssetDropdownEngine();
      const config = marketAssetConfig[selectedToken];
      
      document.getElementById("form-asset-token").textContent = config.unit;
      document.getElementById("ob-size-header").textContent = `Size(${config.unit})`;
      
      loadTradingViewWidget(config.tvSymbol);
      buildMobileOrderbookStream();
      setTimeout(stepFluctuationTickLoop, 1000);
    });
  </script>
</body>
</html>
