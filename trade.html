<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Trading Terminal</title>
  <!-- Icon Libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #131722;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e1e6eb;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }

    /* Mobile Vertical Stack Layout Engine */
    .mobile-terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* 1. Header Infrastructure Node */
    .header-node {
      background-color: #1c2030;
      border-bottom: 1px solid #242936;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .header-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* Interactive Asset Selector Element */
    .asset-branding {
      display: flex;
      align-items: center;
      gap: 4px;
      background-color: #131722;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #242936;
      max-width: 55%;
    }
    .asset-select {
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      text-overflow: ellipsis;
    }
    .asset-select option {
      background-color: #1c2030;
      color: #ffffff;
    }
    .live-price-badge { font-family: monospace; font-size: 14px; font-weight: 800; text-align: right; }
    
    /* Dedicated Mobile Funding Suite Links */
    .mobile-funding-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .funding-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 4px;
      transition: opacity 0.15s ease;
    }
    .lnk-deposit { background-color: #00b09b; color: #ffffff; }
    .lnk-withdraw { background-color: rgba(240, 185, 11, 0.1); color: #f0b90b; border: 1px solid rgba(240, 185, 11, 0.3); }
    .funding-link:active { opacity: 0.7; }

    /* 2. Chart Screen Workspace Block */
    .chart-viewport-box {
      flex: 1;
      background-color: #131722;
      position: relative;
      border-bottom: 1px solid #242936;
    }

    /* 3. Split Component Data Row */
    .split-data-hub {
      height: 220px;
      background-color: #161a25;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      border-bottom: 1px solid #242936;
    }

    /* Mobile Orderbook View */
    .compact-orderbook {
      border-right: 1px solid #242936;
      display: flex;
      flex-direction: column;
      padding: 6px 0;
      font-family: monospace;
      font-size: 11px;
    }
    .ob-stream-header {
      display: flex;
      justify-content: space-between;
      color: #5d6580;
      padding: 0 10px 4px 10px;
      font-weight: bold;
    }
    .ob-row-mobile {
      display: flex;
      justify-content: space-between;
      padding: 2px 10px;
    }
    .ob-price-lbl { font-weight: bold; }
    .ob-amt-lbl { color: #b5b9c4; }
    .color-up { color: #26a69a; }
    .color-down { color: #ef5350; }

    .mid-spread-strip {
      background-color: #131722;
      padding: 4px 10px;
      font-weight: bold;
      text-align: center;
      border-top: 1px solid #242936;
      border-bottom: 1px solid #242936;
      font-size: 12px;
    }

    /* Mobile Form Ticket Box with Internal Buy/Sell Switch Toggles */
    .mobile-ticket-form {
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #131722;
    }
    .action-type-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background-color: #161a25;
      border-radius: 4px;
      padding: 2px;
      margin-bottom: 8px;
    }
    .tab-btn {
      border: none;
      background: transparent;
      color: #787f99;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 0;
      border-radius: 3px;
      cursor: pointer;
    }
    .tab-btn.active-buy { background-color: #26a69a; color: white; }
    .tab-btn.active-sell { background-color: #ef5350; color: white; }

    .form-input-element {
      display: flex;
      background-color: #1c2030;
      border: 1px solid #242936;
      border-radius: 4px;
      margin-bottom: 6px;
      align-items: center;
      padding: 0 6px;
    }
    .form-lbl { font-size: 10px; color: #787f99; font-weight: bold; width: 35px; }
    .form-input {
      background: transparent;
      border: none;
      width: 100%;
      color: #ffffff;
      padding: 6px;
      font-family: monospace;
      text-align: right;
      outline: none;
      font-size: 12px;
    }
    .asset-label { font-size: 10px; color: #787f99; font-weight: bold; padding-left: 4px; text-transform: uppercase; }

    .action-submit-btn {
      width: 100%;
      padding: 10px 0;
      background: #26a69a;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .action-submit-btn.sell-mode { background: #ef5350; }

    /* 4. Mini Footer Position Bar */
    .mini-pos-bar {
      height: 34px;
      background-color: #1c2030;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 11px;
      color: #787f99;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="mobile-terminal">
    
    <!-- 1. Header Infrastructure Node -->
    <header class="header-node">
      <div class="header-top-row">
        <div class="asset-branding">
          <i class="fa-solid fa-earth-americas" style="color: #38bdf8; font-size: 12px;"></i>
          <!-- Dynamically Populated Dropdown Element Container -->
          <select id="asset-selector" class="asset-select" onchange="handleAssetChange(this.value)"></select>
        </div>
        <div id="m-live-price" class="live-price-badge color-up">--</div>
      </div>
      
      <!-- Funding Targets Links -->
      <div class="mobile-funding-box">
        <a href="deposit.html" class="funding-link lnk-deposit">
          <i class="fa-solid fa-wallet"></i> Deposit
        </a>
        <a href="withdraw.html" class="funding-link lnk-withdraw">
          <i class="fa-solid fa-money-bill-transfer"></i> Withdraw
        </a>
      </div>
    </header>

    <!-- 2. Chart Screen Workspace Block -->
    <section class="chart-viewport-box">
      <div id="tradingview_mobile_chart" style="width: 100%; height: 100%;"></div>
    </section>

    <!-- 3. Dual-Channel Component Data Deck Frame -->
    <section class="split-data-hub">
      
      <!-- Dynamic Orderbook Node -->
      <div class="compact-orderbook">
        <div class="ob-stream-header">
          <span>Price</span>
          <span id="ob-size-header">Size</span>
        </div>
        <div id="m-asks-container" style="display:flex; flex-direction:column-reverse; flex:1; justify-content:end;"></div>
        <div class="mid-spread-strip color-up" id="m-spread-price">--</div>
        <div id="m-bids-container" style="flex:1;"></div>
      </div>

      <!-- Order Ticket Box with Tab Controls -->
      <div class="mobile-ticket-form">
        <div>
          <!-- Buy / Sell Toggle Tabs -->
          <div class="action-type-tabs">
            <button id="tab-buy" class="tab-btn active-buy" onclick="setTradeMode('buy')">Buy</button>
            <button id="tab-sell" class="tab-btn" onclick="setTradeMode('sell')">Sell</button>
          </div>

          <div class="form-input-element">
            <span class="form-lbl">Price</span>
            <input type="text" class="form-input" value="--" id="form-price-val" disabled>
          </div>
          <div class="form-input-element">
            <span class="form-lbl">Amt</span>
            <input type="number" class="form-input" placeholder="100" id="form-amount-input">
            <span id="form-asset-token" class="asset-label">--</span>
          </div>
        </div>

        <button id="submit-order-btn" class="action-submit-btn" onclick="alert('Order Dispatched to Liquidity Provider Provider Pool')">Buy Long</button>
      </div>

    </section>

    <!-- 4. Structural Mobile Mini Footer Bar -->
    <footer class="mini-pos-bar">
      <span><i class="fa-solid fa-folder-open" style="margin-right:4px;"></i> Positions (0)</span>
      <span style="font-family:monospace; font-size:10px; color:#475569;">MULTI-ASSET NODE</span>
    </footer>

  </div>

  <!-- TradingView Base Integration Script -->

      "GER30": { label: "DAX 40 Index", basePrice: 18450.0, stepSize: 1.5, decimals: 1, tvSymbol: "GLOBALPRIME:GER40", unit: "idx" },
      "UK100": { label: "FTSE 100 Index", basePrice: 8240.0, stepSize: 0.8, decimals: 1, tvSymbol: "GLOBALPRIME:UK100", unit: "idx" },
      "JPN225": { label: "Nikkei 225 Index", basePrice: 38740.0, stepSize: 4.0, decimals: 0, tvSymbol: "GLOBALPRIME:JPN225", unit: "idx" },
      "FRA40": { label: "CAC 40 Index", basePrice: 7980.0, stepSize: 0.8, decimals: 1, tvSymbol: "GLOBALPRIME:FRA40", unit: "idx" },
      "AUS200": { label: "ASX 200 Index", basePrice: 7760.0, stepSize: 0.8, decimals: 1, tvSymbol: "GLOBALPRIME:AUS200", unit: "idx" },
      "HK50": { label: "Hang Seng Index", basePrice: 18240.0, stepSize: 3.5, decimals: 0, tvSymbol: "GLOBALPRIME:HK50", unit: "idx" },
      "COPPER": { label: "Copper Futures", basePrice: 4.620, stepSize: 0.002, decimals: 3, tvSymbol: "COMEX:HG1!", unit: "lbs" },
      "PLATINUM": { label: "Platinum", basePrice: 985.40, stepSize: 0.25, decimals: 2, tvSymbol: "NYMEX:PL1!", unit: "oz" },
      "PALLADIUM": { label: "Palladium", basePrice: 945.20, stepSize: 0.35, decimals: 2, tvSymbol: "NYMEX:PA1!", unit: "oz" },
      "SOYBEAN": { label: "Soybeans", basePrice: 1184.50, stepSize: 0.25, decimals: 2, tvSymbol: "CBOT:ZS1!", unit: "bu" },
      "CORN": { label: "Corn Futures", basePrice: 445.20, stepSize: 0.15, decimals: 2, tvSymbol: "CBOT:ZC1!", unit: "bu" },
      "WHEAT": { label: "Wheat Futures", basePrice: 624.80, stepSize: 0.20, decimals: 2, tvSymbol: "CBOT:ZW1!", unit: "bu" },
      "SUGAR": { label: "Sugar No. 11", basePrice: 18.64, stepSize: 0.02, decimals: 2, tvSymbol: "ICEUS:SB1!", unit: "lbs" },
      "COFFEE": { label: "Coffee Arabica", basePrice: 224.50, stepSize: 0.15, decimals: 2, tvSymbol: "ICEUS:KC1!", unit: "lbs" },
      "COCOA": { label: "Cocoa Futures", basePrice: 8450.0, stepSize: 4.5, decimals: 0, tvSymbol: "ICEUS:CC1!", unit: "mt" },
      "COTTON": { label: "Cotton No. 2", basePrice: 74.20, stepSize: 0.05, decimals: 2, tvSymbol: "ICEUS:CT1!", unit: "lbs" },
      "US2Y": { label: "US 2-Year Treasury Yield", basePrice: 4.882, stepSize: 0.002, decimals: 3, tvSymbol: "TVC:US02Y", unit: "pct" },
      "US10Y": { label: "US 10-Year Treasury Yield", basePrice: 4.224, stepSize: 0.002, decimals: 3, tvSymbol: "TVC:US10Y", unit: "pct" }
    };

    let selectedToken = "BTC";
    let coreGlobalPriceVal = marketAssetConfig[selectedToken].basePrice;
    let activeTradeMode = "buy";
    let currentWidgetInstance = null;

    // Automated loop engine builds option structures directly to DOM without manual listing friction
    function initializeAssetDropdownEngine() {
      const selectBox = document.getElementById("asset-selector");
      if(!selectBox) return;

      let htmlBuffer = "";
      for (const [key, config] of Object.entries(marketAssetConfig)) {
        htmlBuffer += `<option value="${key}">${config.label}</option>`;
      }
      selectBox.innerHTML = htmlBuffer;
      selectBox.value = selectedToken;
    }

    // Load or Swap TradingView Frame Component
    function loadTradingViewWidget(symbolString) {
      currentWidgetInstance = new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "symbol": symbolString,
        "interval": "5",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#131722",
        "enable_publishing": false,
        "hide_side_toolbar": true,
        "allow_symbol_change": false,
        "container_id": "tradingview_mobile_chart",
        "studies": ["MASimple@tv-basicstudies"]
      });
    }

    // Handles switching the active asset from the dynamic dropdown selector
    function handleAssetChange(newToken) {
      selectedToken = newToken;
      const config = marketAssetConfig[selectedToken];
      coreGlobalPriceVal = config.basePrice;
      
      // Update form data units instantly
      document.getElementById("form-asset-token").textContent = config.unit;
      document.getElementById("ob-size-header").textContent = `Size(${config.unit})`;

      // Re-initialize core tracking variables
      loadTradingViewWidget(config.tvSymbol);
      buildMobileOrderbookStream();
    }

    function setTradeMode(mode) {
      activeTradeMode = mode;
      const buyTab = document.getElementById("tab-buy");
      const sellTab = document.getElementById("tab-sell");
      const actionBtn = document.getElementById("submit-order-btn");

      if (mode === 'buy') {
        buyTab.className = "tab-btn active-buy";
        sellTab.className = "tab-btn";
        actionBtn.className = "action-submit-btn";
        actionBtn.textContent = "Buy Long";
      } else {
        buyTab.className = "tab-btn";
        sellTab.className = "tab-btn active-sell";
        actionBtn.className = "action-submit-btn sell-mode";
        actionBtn.textContent = "Sell Short";
      }
    }

    function buildMobileOrderbookStream() {
      const askWrapper = document.getElementById("m-asks-container");
      const bidWrapper = document.getElementById("m-bids-container");
      if(!askWrapper || !bidWrapper) return;

      askWrapper.innerHTML = "";
      bidWrapper.innerHTML = "";
      
      const config = marketAssetConfig[selectedToken];

      // Render 3 Asks (Sells Stack)
      for(let i = 3; i > 0; i--) {
        let price = coreGlobalPriceVal + (i * config.stepSize) + (Math.random() * (config.stepSize * 0.15));
        let size = (Math.random() * 45 + 1.2).toFixed(config.decimals > 4 ? 2 : 1);
        askWrapper.innerHTML += `
          <div class="ob-row-mobile">
            <span class="ob-price-lbl color-down">${price.toFixed(config.decimals)}</span>
            <span class="ob-amt-lbl">${size}</span>
          </div>
        `;
      }

      // Render 3 Bids (Buys Stack)
      for(let i = 1; i <= 3; i++) {
        let price = coreGlobalPriceVal - (i * config.stepSize) - (Math.random() * (config.stepSize * 0.15));
        let size = (Math.random() * 45 + 1.2).toFixed(config.decimals > 4 ? 2 : 1);
        bidWrapper.innerHTML += `
          <div class="ob-row-mobile">
            <span class="ob-price-lbl color-up">${price.toFixed(config.decimals)}</span>
            <span class="ob-amt-lbl">${size}</span>
          </div>
        `;
      }
    }

    function stepFluctuationTickLoop() {
      const config = marketAssetConfig[selectedToken];
      const variance = (Math.random() * config.stepSize * 2) - config.stepSize;
      coreGlobalPriceVal += variance;

      const elementPriceHead = document.getElementById("m-live-price");
      const elementPriceSpread = document.getElementById("m-spread-price");
      const elementInputPrice = document.getElementById("form-price-val");

      if(elementPriceHead && elementPriceSpread) {
        elementPriceHead.textContent = coreGlobalPriceVal.toFixed(config.decimals);
        elementPriceSpread.textContent = coreGlobalPriceVal.toFixed(config.decimals);
        if(elementInputPrice) elementInputPrice.value = coreGlobalPriceVal.toFixed(config.decimals);

        if(variance > 0) {
          elementPriceHead.className = "live-price-badge color-up";
          elementPriceSpread.className = "mid-spread-strip color-up";
        } else {
          elementPriceHead.className = "live-price-badge color-down";
          elementPriceSpread.className = "mid-spread-strip color-down";
        }
      }

      buildMobileOrderbookStream();
      setTimeout(stepFluctuationTickLoop, Math.floor(Math.random() * 900) + 700);
    }

    document.addEventListener("DOMContentLoaded", () => {
      initializeAssetDropdownEngine();
      const config = marketAssetConfig[selectedToken];
      
      // Seed default structural content fields
      document.getElementById("form-asset-token").textContent = config.unit;
      document.getElementById("ob-size-header").textContent = `Size(${config.unit})`;
      
      loadTradingViewWidget(config.tvSymbol);
      buildMobileOrderbookStream();
      setTimeout(stepFluctuationTickLoop, 1000);
    });
  </script>
</body>
